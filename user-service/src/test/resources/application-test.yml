spring:
  application:
    name: user-service
  h2:
    console:
      enabled: true
  jpa:
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        ddl-auto: create
  jwt:
    secret-key: TESTGUYGUYGKUYEOUIPWOEIDUFUHIUHOIUHOUIHOIUHOUHDVDNHLADSUHFWEWEQWERWQgI3nVPEahqxeY8qbPSFGyzyEVxnl4AQcrnVneI
    expire-length: 360000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test
            client-secret: test
            scope:
              - email
          naver:
            client-id: test
            client-secret: test
            scope:
              - nickname
              - email
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

auth:
  token:
    secretKey: TESTGUYGUYGKUYEOUIPWOEIDUFUHIUHOIUHOUIHOIUHOUHDVDNHLADSUHFWEWEQWERWQgI3nVPEahqxeY8qbPSFGyzyEVxnl4AQcrnVneI
